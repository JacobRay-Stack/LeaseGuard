<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2128"/>
      <stop offset="100%" stop-color="#13151a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="100%" stop-color="#b8943e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="url(#gold)" stroke-width="0.75" opacity="0.25"/>
  <!-- Shield -->
  <path d="M10 10 L54 10 L54 42 Q32 60 10 42 Z" fill="rgba(240,216,120,0.05)" stroke="url(#gold)" stroke-width="1.75"/>
  <!-- Chip -->
  <rect x="22" y="18" width="20" height="20" rx="3" fill="none" stroke="url(#gold)" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Pins top -->
  <line x1="26" y1="18" x2="26" y2="14" stroke="url(#gold)" stroke-width="1.1" opacity="0.7"/>
  <line x1="32" y1="18" x2="32" y2="14" stroke="url(#gold)" stroke-width="1.1" opacity="0.7"/>
  <line x1="38" y1="18" x2="38" y2="14" stroke="url(#gold)" stroke-width="1.1" opacity="0.7"/>
  <!-- Pins bottom -->
  <line x1="26" y1="38" x2="26" y2="42" stroke="url(#gold)" stroke-width="1.1" opacity="0.7"/>
  <line x1="32" y1="38" x2="32" y2="42" stroke="url(#gold)" stroke-width="1.1" opacity="0.7"/>
  <line x1="38" y1="38" x2="38" y2="42" stroke="url(#gold)" stroke-width="1.1" opacity="0.7"/>
  <!-- Pins left -->
  <line x1="22" y1="24" x2="18" y2="24" stroke="url(#gold)" stroke-width="1.1" opacity="0.7"/>
  <line x1="22" y1="32" x2="18" y2="32" stroke="url(#gold)" stroke-width="1.1" opacity="0.7"/>
  <!-- Pins right -->
  <line x1="42" y1="24" x2="46" y2="24" stroke="url(#gold)" stroke-width="1.1" opacity="0.7"/>
  <line x1="42" y1="32" x2="46" y2="32" stroke="url(#gold)" stroke-width="1.1" opacity="0.7"/>
  <!-- AI text inside chip -->
  <text x="32" y="32" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="url(#gold)" text-anchor="middle" filter="url(#glow)">AI</text>
</svg>
