<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2128"/>
      <stop offset="100%" stop-color="#13151a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="100%" stop-color="#b8943e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark rounded square bg -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>

  <!-- Shield, centered, scaled up to fill the icon -->
  <path d="M10 10 L54 10 L54 42 Q32 60 10 42 Z" fill="rgba(240,216,120,0.06)" stroke="url(#gold)" stroke-width="1.75"/>

  <!-- Neural nodes — scaled to shield -->
  <circle cx="32" cy="20" r="3.5" fill="url(#gold)" opacity="0.95" filter="url(#glow)"/>
  <circle cx="18" cy="32" r="2.5" fill="url(#gold)" opacity="0.75"/>
  <circle cx="32" cy="38" r="2.5" fill="url(#gold)" opacity="0.75"/>
  <circle cx="46" cy="32" r="2.5" fill="url(#gold)" opacity="0.75"/>
  <circle cx="22" cy="22" r="2"   fill="url(#gold)" opacity="0.5"/>
  <circle cx="42" cy="22" r="2"   fill="url(#gold)" opacity="0.5"/>

  <!-- Connections -->
  <line x1="32" y1="20" x2="18" y2="32" stroke="url(#gold)" stroke-width="1"   opacity="0.45"/>
  <line x1="32" y1="20" x2="46" y2="32" stroke="url(#gold)" stroke-width="1"   opacity="0.45"/>
  <line x1="18" y1="32" x2="32" y2="38" stroke="url(#gold)" stroke-width="1"   opacity="0.45"/>
  <line x1="46" y1="32" x2="32" y2="38" stroke="url(#gold)" stroke-width="1"   opacity="0.45"/>
  <line x1="32" y1="20" x2="22" y2="22" stroke="url(#gold)" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="20" x2="42" y2="22" stroke="url(#gold)" stroke-width="0.6" opacity="0.3"/>
</svg>
